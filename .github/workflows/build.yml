name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create project files
        run: |
          mkdir -p www
          cp index.html www/index.html

          cat > package.json << 'EOF'
          {
            "name": "flappy-winner",
            "version": "1.0.0",
            "description": "Flappy Winner mobile app",
            "dependencies": {
              "@capacitor/android": "^6.1.2",
              "@capacitor/core": "^6.1.2"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.1.2"
            }
          }
          EOF

          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.flappy.winner",
            "appName": "Flappy Winner",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Rename APK with build number
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/flappy-winner-${{ github.run_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Flappy Winner Build ${{ github.run_number }}
          files: release/flappy-winner-${{ github.run_number }}.apk
