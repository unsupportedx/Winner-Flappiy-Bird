<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Winner 🏆</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:radial-gradient(ellipse at center,#0c1430 0%,#040810 100%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;overflow:hidden;font-family:'Nunito',sans-serif;
  }
  #wrap{
    position:relative;width:620px;height:750px;border-radius:30px;overflow:hidden;
    box-shadow:0 0 0 1.5px rgba(255,255,255,.08),0 40px 100px rgba(0,0,0,.9),0 0 160px rgba(80,150,255,.1);
  }
  canvas{display:block;width:100%;height:100%;}
  #ui{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;}
  #score{
    position:absolute;top:28px;left:50%;transform:translateX(-50%);
    font-family:'Fredoka One',cursive;font-size:68px;color:#fff;
    text-shadow:0 4px 12px rgba(0,0,0,.7),0 0 44px rgba(255,220,80,.95),0 0 90px rgba(255,160,0,.4);
    letter-spacing:3px;transition:transform .12s cubic-bezier(.34,1.56,.64,1);display:none;white-space:nowrap;
  }
  .scr{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;cursor:pointer;}
  .hidden{display:none!important;}
  #ss{background:linear-gradient(160deg,rgba(8,12,36,.93) 0%,rgba(14,28,68,.88) 100%);backdrop-filter:blur(5px);}
  #ss h1{font-family:'Fredoka One',cursive;font-size:64px;color:#FFE566;text-align:center;line-height:1.1;
    text-shadow:0 6px 24px rgba(255,200,0,.65),0 12px 55px rgba(255,140,0,.28);margin-bottom:10px;animation:tpulse 2.2s ease-in-out infinite;}
  #ss .sub{font-size:17px;color:rgba(180,220,255,.85);font-weight:700;letter-spacing:1.5px;margin-bottom:44px;}
  .tapbtn{font-size:22px;color:rgba(255,255,255,.9);font-weight:800;animation:tapulse 1.3s ease-in-out infinite;
    background:rgba(255,255,255,.1);padding:16px 44px;border-radius:60px;border:2px solid rgba(255,255,255,.18);backdrop-filter:blur(10px);letter-spacing:1px;}
  .badge{position:absolute;top:22px;right:22px;background:linear-gradient(135deg,#FFD700,#FF8C00);
    color:#1a0800;font-size:11px;font-weight:900;padding:6px 14px;border-radius:20px;letter-spacing:1.5px;box-shadow:0 4px 18px rgba(255,140,0,.5);}
  #gs{background:linear-gradient(160deg,rgba(4,8,28,.95) 0%,rgba(8,22,55,.92) 100%);backdrop-filter:blur(8px);}
  #gs h2{font-family:'Fredoka One',cursive;font-size:56px;color:#FFE566;text-shadow:0 4px 24px rgba(255,200,0,.7);margin-bottom:18px;}
  .sbox{background:rgba(255,255,255,.07);border:2px solid rgba(255,220,80,.28);border-radius:22px;padding:22px 64px;margin-bottom:32px;text-align:center;backdrop-filter:blur(10px);}
  .sbox .lb{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px;}
  .sbox .vl{font-family:'Fredoka One',cursive;font-size:76px;color:#FFE566;text-shadow:0 0 36px rgba(255,200,0,.6);line-height:1;}
  .rbtn{background:linear-gradient(135deg,#FFD700 0%,#FF8C00 100%);color:#1a0800;font-family:'Fredoka One',cursive;font-size:24px;
    border:none;padding:18px 58px;border-radius:60px;cursor:pointer;pointer-events:all;
    box-shadow:0 8px 34px rgba(255,140,0,.5),0 2px 0 rgba(255,255,255,.28) inset;transition:transform .15s,box-shadow .15s;letter-spacing:1px;}
  .rbtn:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 14px 46px rgba(255,140,0,.7);}
  .rbtn:active{transform:translateY(0) scale(.97);}
  .trop{font-size:70px;margin-bottom:18px;animation:trb .7s cubic-bezier(.34,1.56,.64,1);}
  #wpop{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%) scale(0);
    font-family:'Fredoka One',cursive;font-size:34px;color:#FFE566;text-shadow:0 0 30px rgba(255,200,0,1);
    text-align:center;background:rgba(0,0,0,.72);padding:18px 38px;border-radius:18px;
    border:2px solid rgba(255,220,80,.38);pointer-events:none;
    transition:transform .38s cubic-bezier(.34,1.56,.64,1),opacity .38s;opacity:0;white-space:nowrap;}
  #wpop.show{transform:translate(-50%,-50%) scale(1);opacity:1;}
  @keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  @keyframes tapulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.97)}}
  @keyframes trb{0%{transform:scale(0) rotate(-25deg)}70%{transform:scale(1.25) rotate(6deg)}100%{transform:scale(1) rotate(0)}}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="620" height="750"></canvas>
  <div id="ui">
    <div id="score">0</div>
    <div id="ss" class="scr">
      <div class="badge">✨ PRO MODE</div>
      <canvas id="bp" width="160" height="120" style="margin-bottom:26px;filter:drop-shadow(0 12px 38px rgba(255,200,0,.55))"></canvas>
      <h1>FLAPPY<br>WINNER</h1>
      <p class="sub">Kaybetmek imkânsız! &nbsp;·&nbsp; You can't lose!</p>
      <div class="tapbtn">👆 Tıkla / Tap to Start</div>
    </div>
    <div id="gs" class="scr hidden">
      <div class="trop">🏆</div>
      <h2>Harika Uçuş! 🎉</h2>
      <div class="sbox"><div class="lb">Skor / Score</div><div class="vl" id="fs">0</div></div>
      <button class="rbtn" id="rb">🔄 Tekrar Oyna</button>
    </div>
    <div id="wpop">⭐ Süper! ⭐</div>
  </div>
</div>
<script>
const C=document.getElementById('c'), X=C.getContext('2d');
const W=620, H=750, GY=H-95;
const PG=200, PW=76, PS=1.85, PE=160;
const R=30; // bird radius

let gst='idle', sc=0, fr=0, aid;

const bird={x:115,y:H/2,vy:0,grav:.28,fp:-6.5,mf:8,wp:0,wd:1,tp:0,rf:0,trail:[]};
let pipes=[], parts=[], gox=0;

const STARS=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*(GY*.6),r:Math.random()*2+.4,ph:Math.random()*Math.PI*2,sp:Math.random()*.035+.01}));
const CLOUDS=Array.from({length:9},(_,i)=>({x:i*(W/8)+Math.random()*55,y:55+Math.random()*145,sc:.65+Math.random()*.75,sp:.20+Math.random()*.22,op:.5+Math.random()*.38}));

function rb(){bird.x=115;bird.y=H/2;bird.vy=0;bird.trail=[];bird.rf=0;}
function pipe(){const mn=115,mx=GY-PG-105;pipes.push({x:W+22,th:mn+Math.random()*(mx-mn),pd:false});}
function burst(x,y,col,n=10){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*3.5+1;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,life:1,dc:.035+Math.random()*.025,r:Math.random()*6+3,col});}}

// ── SKY
function dSky(){
  const g=X.createLinearGradient(0,0,0,GY);
  g.addColorStop(0,'#03051c');g.addColorStop(.22,'#091440');g.addColorStop(.58,'#112c68');g.addColorStop(.84,'#1c4e90');g.addColorStop(1,'#367ab8');
  X.fillStyle=g;X.fillRect(0,0,W,GY);
  const h=X.createLinearGradient(0,GY-140,0,GY);
  h.addColorStop(0,'rgba(255,155,55,0)');h.addColorStop(1,'rgba(255,115,28,.22)');
  X.fillStyle=h;X.fillRect(0,GY-140,W,140);
}

// ── STARS
function dStars(){
  STARS.forEach(s=>{
    s.ph+=s.sp;const a=.35+.65*Math.abs(Math.sin(s.ph));
    X.beginPath();X.arc(s.x,s.y,s.r,0,Math.PI*2);X.fillStyle=`rgba(255,255,255,${a})`;X.fill();
    const hg=X.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*5);
    hg.addColorStop(0,`rgba(210,230,255,${a*.32})`);hg.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=hg;X.beginPath();X.arc(s.x,s.y,s.r*5,0,Math.PI*2);X.fill();
  });
}

// ── MOON
function dMoon(){
  const mx=W-95,my=90,mr=38;
  let og=X.createRadialGradient(mx,my,0,mx,my,95);og.addColorStop(0,'rgba(255,245,180,.2)');og.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=og;X.beginPath();X.arc(mx,my,95,0,Math.PI*2);X.fill();
  let mb=X.createRadialGradient(mx-10,my-10,2,mx,my,mr);
  mb.addColorStop(0,'#fffdf0');mb.addColorStop(.45,'#f5e880');mb.addColorStop(1,'#b08828');
  X.fillStyle=mb;X.beginPath();X.arc(mx,my,mr,0,Math.PI*2);X.fill();
  [[mx-11,my-9,7],[mx+13,my+11,5],[mx-3,my+16,3.5],[mx+9,my-15,2.8]].forEach(([cx,cy,cr])=>{
    X.fillStyle='rgba(155,115,28,.38)';X.beginPath();X.arc(cx,cy,cr,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(115,85,10,.28)';X.lineWidth=.7;X.stroke();
    X.fillStyle='rgba(255,255,200,.11)';X.beginPath();X.arc(cx-cr*.3,cy-cr*.3,cr*.55,0,Math.PI*2);X.fill();
  });
}

// ── CLOUDS
function dCloud(c){
  X.save();X.globalAlpha=c.op;
  const b=(x,y,r)=>{const g=X.createRadialGradient(x,y-r*.3,r*.08,x,y,r);g.addColorStop(0,'rgba(255,255,255,.98)');g.addColorStop(.55,'rgba(225,238,255,.88)');g.addColorStop(1,'rgba(180,210,255,.18)');X.beginPath();X.arc(x,y,r,0,Math.PI*2);X.fillStyle=g;X.fill();};
  const s=c.sc;b(c.x,c.y,33*s);b(c.x+27*s,c.y+7*s,26*s);b(c.x-25*s,c.y+9*s,22*s);b(c.x+6*s,c.y-17*s,23*s);b(c.x-10*s,c.y-13*s,19*s);
  X.restore();
}

// ── GROUND
function dGround(){
  const dg=X.createLinearGradient(0,GY,0,H);dg.addColorStop(0,'#5e3c1a');dg.addColorStop(.18,'#3d2410');dg.addColorStop(1,'#180c04');
  X.fillStyle=dg;X.fillRect(0,GY,W,H-GY);
  const gg=X.createLinearGradient(0,GY-18,0,GY+12);gg.addColorStop(0,'#65dc65');gg.addColorStop(.5,'#3ebb3e');gg.addColorStop(1,'#1e721e');
  X.fillStyle=gg;X.fillRect(0,GY-9,W,24);
  X.fillStyle='rgba(255,255,255,.10)';X.fillRect(0,GY-9,W,5);
  if(gst==='playing') gox=(gox-PS*.75+W*3)%(W+45);
  for(let i=-45;i<W+55;i+=22){
    const gx=((i+gox)%(W+55))-18;
    X.strokeStyle='rgba(28,95,28,.72)';X.lineWidth=1.7;
    for(let t=-4;t<=4;t+=4){X.beginPath();X.moveTo(gx+t,GY-7);X.quadraticCurveTo(gx+t+(t>0?4:-4),GY-16,gx+t+(t>0?7:-7),GY-20);X.stroke();}
  }
  const sh=X.createLinearGradient(0,GY+15,0,GY+30);sh.addColorStop(0,'rgba(0,0,0,.22)');sh.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=sh;X.fillRect(0,GY+15,W,15);
}

// ── PIPE
function dPipe(p){
  const bY=p.th+PG;
  const seg=(x,y,w,h,top)=>{
    if(h<=0)return;
    X.fillStyle='rgba(0,0,0,.26)';X.fillRect(x+7,y+(top?0:7),w,h);
    const pg=X.createLinearGradient(x,0,x+w,0);
    pg.addColorStop(0,'#186618');pg.addColorStop(.12,'#54d854');pg.addColorStop(.35,'#40c040');pg.addColorStop(.65,'#2ea42e');pg.addColorStop(.88,'#187818');pg.addColorStop(1,'#0c4c0c');
    X.fillStyle=pg;X.fillRect(x,y,w,h);
    X.fillStyle='rgba(255,255,255,.19)';X.fillRect(x+10,y,12,h);
    const sl=X.createLinearGradient(x+10,0,x+24,0);sl.addColorStop(0,'rgba(255,255,255,.13)');sl.addColorStop(1,'rgba(255,255,255,0)');
    X.fillStyle=sl;X.fillRect(x+10,y,14,h);
    X.fillStyle='rgba(0,0,0,.2)';X.fillRect(x+w-13,y,13,h);
    for(let ry=y+32;ry<y+h-12;ry+=58){
      X.fillStyle='rgba(0,0,0,.17)';X.fillRect(x,ry,w,7);
      X.fillStyle='rgba(255,255,255,.07)';X.fillRect(x,ry+7,w,3);
      for(let bx=x+14;bx<x+w-12;bx+=20){
        X.fillStyle='rgba(80,200,80,.58)';X.beginPath();X.arc(bx,ry+3.5,2.6,0,Math.PI*2);X.fill();
        X.fillStyle='rgba(255,255,255,.33)';X.beginPath();X.arc(bx-.7,ry+2.5,1.1,0,Math.PI*2);X.fill();
      }
    }
    const cx=x-9,cw=w+18,cy=top?y+h-28:y-9,ch=36;
    const cg=X.createLinearGradient(cx,0,cx+cw,0);
    cg.addColorStop(0,'#0c5c0c');cg.addColorStop(.10,'#64e464');cg.addColorStop(.40,'#4cce4c');cg.addColorStop(.70,'#30ac30');cg.addColorStop(.92,'#187c18');cg.addColorStop(1,'#094809');
    X.fillStyle=cg;X.beginPath();X.roundRect(cx,cy,cw,ch,5);X.fill();
    X.fillStyle='rgba(255,255,255,.22)';X.fillRect(cx+10,cy+5,17,ch-10);
    X.fillStyle='rgba(0,0,0,.20)';X.fillRect(cx+cw-14,cy,14,ch);
    X.strokeStyle='rgba(0,55,0,.52)';X.lineWidth=1.5;X.beginPath();X.roundRect(cx,cy,cw,ch,5);X.stroke();
    X.strokeStyle='rgba(120,255,120,.14)';X.lineWidth=1;X.beginPath();X.moveTo(cx+4,cy+2);X.lineTo(cx+cw-4,cy+2);X.stroke();
    X.strokeStyle='rgba(0,45,0,.35)';X.lineWidth=1;X.strokeRect(x,y,w,h);
  };
  seg(p.x,0,PW,p.th,true);
  seg(p.x,bY,PW,H-bY,false);
}

// ── BIRD (ultra detailed)
function dBird(c,bx,by,vy){
  const wp=bird.wp, tp=bird.tp, rf=bird.rf;
  const tilt=Math.max(-34,Math.min(40,vy*3.2));
  c.save();c.translate(bx,by);c.rotate(tilt*Math.PI/180);

  // Shadow
  c.save();c.globalAlpha=.22;c.fillStyle='#000';c.beginPath();c.ellipse(6,R+8,R*1.15,R*.34,0,0,Math.PI*2);c.fill();c.restore();

  // ── TAIL FEATHERS
  const tf=[
    [Math.PI*.82+Math.sin(tp)*.06,32,9.5,'#c4780a','#e08c0c'],
    [Math.PI*.88+Math.sin(tp+.5)*.05,37,11,'#d4880c','#f0a010'],
    [Math.PI*.94+Math.sin(tp+1)*.06,34,9.5,'#c0700a','#dc8a0e'],
    [Math.PI*.98+Math.sin(tp+1.5)*.06,28,8,'#b06008','#cc800c'],
  ];
  tf.forEach(([ang,len,w,c1,c2])=>{
    c.save();c.rotate(ang);
    const fg=c.createLinearGradient(0,0,len,0);fg.addColorStop(0,c1);fg.addColorStop(.55,c2);fg.addColorStop(1,'rgba(160,90,4,.15)');
    c.fillStyle=fg;c.beginPath();c.ellipse(len/2,0,len/2,w/2,0,0,Math.PI*2);c.fill();
    c.strokeStyle='rgba(100,50,0,.5)';c.lineWidth=.9;c.beginPath();c.moveTo(0,0);c.lineTo(len,0);c.stroke();
    c.strokeStyle='rgba(180,100,10,.22)';c.lineWidth=.55;
    for(let bi=6;bi<len-4;bi+=5){c.beginPath();c.moveTo(bi,0);c.lineTo(bi-4,w*.42);c.stroke();c.beginPath();c.moveTo(bi,0);c.lineTo(bi-4,-w*.42);c.stroke();}
    c.restore();
  });

  // ── LOWER WING
  c.save();c.rotate(wp*.52+.18);
  const lw=c.createLinearGradient(-5,7,20,30);lw.addColorStop(0,'#d88c0e');lw.addColorStop(.45,'#b46a08');lw.addColorStop(1,'rgba(88,44,4,.28)');
  c.fillStyle=lw;c.beginPath();c.ellipse(5,15,18,10,Math.PI*.2,0,Math.PI*2);c.fill();
  // tip feathers
  for(let fi=0;fi<4;fi++){const fa=Math.PI*.12+fi*.13;const ex=5+Math.cos(fa)*16,ey=15+Math.sin(fa)*9;c.strokeStyle='rgba(90,42,0,.42)';c.lineWidth=.9;c.beginPath();c.moveTo(ex,ey);c.lineTo(ex+Math.cos(fa)*9,ey+Math.sin(fa)*8);c.stroke();}
  c.restore();

  // ── BODY
  const bg=c.createRadialGradient(-7,-7,2,0,0,R);
  bg.addColorStop(0,'#ffe88a');bg.addColorStop(.22,'#f8d000');bg.addColorStop(.55,'#e2aa00');bg.addColorStop(.85,'#c27c00');bg.addColorStop(1,'#925200');
  c.fillStyle=bg;c.beginPath();c.ellipse(0,0,R,R*.82,0,0,Math.PI*2);c.fill();

  // Specular highlight
  const sp=c.createRadialGradient(-R*.38,-R*.42,1,-R*.22,-R*.28,R*.72);
  sp.addColorStop(0,'rgba(255,255,220,.75)');sp.addColorStop(.48,'rgba(255,242,155,.22)');sp.addColorStop(1,'rgba(255,200,0,0)');
  c.fillStyle=sp;c.beginPath();c.ellipse(-R*.2,-R*.3,R*.56,R*.4,-.32,0,Math.PI*2);c.fill();

  // Feather texture
  c.save();c.globalAlpha=.15;c.strokeStyle='#8a5800';c.lineWidth=.85;
  for(let fy=-R*.55;fy<R*.65;fy+=5.5){c.beginPath();c.moveTo(-R*.65,fy);c.quadraticCurveTo(-R*.1+Math.sin(fy*.28)*4.5,fy+3,R*.65,fy+1);c.stroke();}
  c.restore();

  // Ruffle effect on flap
  if(rf>0){
    c.save();c.globalAlpha=rf*.45;c.strokeStyle='#ffe070';c.lineWidth=1.6;
    for(let ri=0;ri<5;ri++){const ra=Math.PI*(.38+ri*.13);c.beginPath();c.moveTo(Math.cos(ra)*R*.72,Math.sin(ra)*R*.62);c.lineTo(Math.cos(ra)*(R+7+ri*2.5),Math.sin(ra)*(R*.62+5+ri*1.2));c.stroke();}
    c.restore();
  }

  // ── UPPER WING
  c.save();c.rotate(-wp-.12);
  const uw=c.createLinearGradient(-9,-13,22,7);uw.addColorStop(0,'#ffe88a');uw.addColorStop(.38,'#eabb00');uw.addColorStop(1,'rgba(138,78,0,.22)');
  c.fillStyle=uw;c.beginPath();c.ellipse(0,-R*.52,20,10,-.28,0,Math.PI*2);c.fill();
  // primaries
  for(let fi=0;fi<4;fi++){const fa=-Math.PI*.38+fi*.15;const sx=Math.cos(fa)*15,sy=-R*.52+Math.sin(fa)*9;c.strokeStyle='rgba(140,80,5,.48)';c.lineWidth=.95;c.beginPath();c.moveTo(sx,sy);c.lineTo(sx+Math.cos(fa)*10,sy+Math.sin(fa)*10);c.stroke();}
  c.restore();

  // ── THROAT PATCH
  const tp3=c.createRadialGradient(R*.3,2,1,R*.3,2,R*.62);tp3.addColorStop(0,'rgba(255,255,255,.52)');tp3.addColorStop(.42,'rgba(255,242,205,.18)');tp3.addColorStop(1,'rgba(255,200,0,0)');
  c.fillStyle=tp3;c.beginPath();c.ellipse(R*.33,3,R*.56,R*.46,.3,0,Math.PI*2);c.fill();

  // ── EYE
  // Socket shadow
  c.fillStyle='rgba(58,28,0,.38)';c.beginPath();c.ellipse(R*.44,-R*.28,10.5,10.5,0,0,Math.PI*2);c.fill();
  // Sclera
  const ew=c.createRadialGradient(R*.38,-R*.36,0,R*.38,-R*.36,9.5);ew.addColorStop(0,'#fff');ew.addColorStop(.65,'#eef4ff');ew.addColorStop(1,'rgba(200,220,255,.7)');
  c.fillStyle=ew;c.beginPath();c.ellipse(R*.43,-R*.33,9.5,9.5,0,0,Math.PI*2);c.fill();
  // Iris
  const ig=c.createRadialGradient(R*.44,-R*.3,0,R*.44,-R*.3,7.5);ig.addColorStop(0,'#55aaff');ig.addColorStop(.35,'#1a66dd');ig.addColorStop(.75,'#0030aa');ig.addColorStop(1,'#001060');
  c.fillStyle=ig;c.beginPath();c.arc(R*.44,-R*.31,7.5,0,Math.PI*2);c.fill();
  // Iris ring detail
  c.strokeStyle='rgba(90,160,255,.55)';c.lineWidth=1;c.beginPath();c.arc(R*.44,-R*.31,4.8,0,Math.PI*2);c.stroke();
  // Pupil
  const pg=c.createRadialGradient(R*.46,-R*.33,0,R*.44,-R*.31,4.2);pg.addColorStop(0,'#111');pg.addColorStop(1,'#000');
  c.fillStyle=pg;c.beginPath();c.arc(R*.44,-R*.31,4.2,0,Math.PI*2);c.fill();
  // Main catchlight
  c.fillStyle='rgba(255,255,255,.94)';c.beginPath();c.ellipse(R*.475,-R*.38,2.4,1.7,-.5,0,Math.PI*2);c.fill();
  // Secondary catchlight
  c.fillStyle='rgba(255,255,255,.52)';c.beginPath();c.arc(R*.41,-R*.27,1.1,0,Math.PI*2);c.fill();
  // Eye outline
  c.strokeStyle='rgba(40,18,0,.6)';c.lineWidth=.85;c.beginPath();c.arc(R*.44,-R*.31,9.5,0,Math.PI*2);c.stroke();

  // ── BEAK
  // Upper mandible
  const bu=c.createLinearGradient(R*.5,-2,R+16,2);bu.addColorStop(0,'#ff9800');bu.addColorStop(.45,'#ffbc22');bu.addColorStop(1,'#cc5500');
  c.fillStyle=bu;c.beginPath();c.moveTo(R*.5,-4.5);c.bezierCurveTo(R*.76,-7,R+11,-2.5,R+17,2);c.bezierCurveTo(R+11,4.5,R*.76,2,R*.5,1);c.closePath();c.fill();
  // Upper highlight
  c.fillStyle='rgba(255,225,105,.48)';c.beginPath();c.moveTo(R*.55,-3.5);c.lineTo(R+9,-1.5);c.lineTo(R+9,.5);c.lineTo(R*.55,-.5);c.closePath();c.fill();
  // Lower mandible
  const bl=c.createLinearGradient(R*.5,1,R+13,5);bl.addColorStop(0,'#cc6800');bl.addColorStop(1,'#892200');
  c.fillStyle=bl;c.beginPath();c.moveTo(R*.5,1.5);c.bezierCurveTo(R*.76,3,R+9,4.5,R+13,3.5);c.bezierCurveTo(R+9,6.5,R*.76,6.5,R*.5,4.5);c.closePath();c.fill();
  // Nostril
  c.fillStyle='rgba(0,0,0,.42)';c.beginPath();c.ellipse(R*.73,-1.5,2.6,1.6,.28,0,Math.PI*2);c.fill();
  // Beak outline
  c.strokeStyle='rgba(80,30,0,.52)';c.lineWidth=.85;c.beginPath();c.moveTo(R*.5,-4.5);c.bezierCurveTo(R*.76,-7,R+11,-2.5,R+17,2);c.bezierCurveTo(R+11,6.5,R*.76,6.5,R*.5,4.5);c.closePath();c.stroke();

  // ── CHEEK BLUSH
  c.fillStyle='rgba(255,108,68,.36)';c.beginPath();c.ellipse(R*.28,R*.2,8.5,5.5,.2,0,Math.PI*2);c.fill();

  // ── BODY OUTLINE
  c.strokeStyle='rgba(100,58,0,.32)';c.lineWidth=1.3;c.beginPath();c.ellipse(0,0,R,R*.82,0,0,Math.PI*2);c.stroke();

  c.restore();
}

// ── PARTICLES
function dParts(){
  parts.forEach(p=>{
    X.save();X.globalAlpha=p.life;
    const g=X.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);g.addColorStop(0,p.col);g.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=g;X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();X.restore();
    p.x+=p.vx;p.y+=p.vy;p.vy+=.13;p.life-=p.dc;
  });
  parts=parts.filter(p=>p.life>0);
}

// ── CHEAT ENGINE
function cheat(){
  if(gst!=='playing')return;
  pipes.forEach(p=>{
    const gc=p.th+PG/2, bxR=bird.x+R*.72, pL=p.x;
    const appr=bxR>pL-108&&bird.x<p.x+PW+42;
    if(appr){
      const dist=pL-bxR, danger=Math.max(0,1-dist/108);
      const diff=gc-bird.y;
      bird.vy=bird.vy*.80+diff*.02*danger;
      if(bird.y-R*.72<p.th+24&&bird.vy<0)bird.vy=Math.abs(bird.vy)*.32;
      if(bird.y+R*.72>p.th+PG-24&&bird.vy>0)bird.vy=-Math.abs(bird.vy)*.32;
    }
  });
  if(bird.y+R*.72>GY-16){bird.y=GY-R*.72-16;bird.vy=-5.2;burst(bird.x,bird.y+22,'#88ff88',6);}
  if(bird.y-R*.72<16){bird.y=R*.72+16;bird.vy=4;}
}

// ── WIN POP
let wpt=null;
function pop(msg){const e=document.getElementById('wpop');e.textContent=msg;e.classList.add('show');clearTimeout(wpt);wpt=setTimeout(()=>e.classList.remove('show'),1050);}

// ── NEAR MISS
function nearMiss(){
  pipes.forEach(p=>{
    const bR=bird.x+R*.62,bL=bird.x-R*.62,bT=bird.y-R*.62,bB=bird.y+R*.62;
    if(bR>p.x&&bL<p.x+PW){if(Math.abs(bT-p.th)<30||Math.abs(bB-(p.th+PG))<30)pop('💨 Çok Yakın!');}
  });
}

// ── UPDATE
function update(){
  if(gst!=='playing')return; fr++;
  bird.vy+=bird.grav; bird.vy=Math.min(bird.vy,bird.mf); bird.y+=bird.vy;
  bird.wp+=.22*bird.wd; if(Math.abs(bird.wp)>.72)bird.wd*=-1;
  bird.tp+=.08; if(bird.rf>0)bird.rf-=.06;
  cheat();
  bird.trail.push({x:bird.x,y:bird.y,a:.44}); if(bird.trail.length>16)bird.trail.shift();
  bird.trail.forEach(t=>t.a*=.77);
  if(fr%PE===0)pipe();
  pipes.forEach(p=>{
    p.x-=PS;
    if(!p.pd&&p.x+PW<bird.x){
      p.pd=true;sc++;document.getElementById('score').textContent=sc;
      burst(bird.x,bird.y,'#FFE566',15);
      const s=document.getElementById('score');s.style.transform='translateX(-50%) scale(1.45)';
      setTimeout(()=>s.style.transform='translateX(-50%) scale(1)',145);
      if(sc%5===0)pop('🌟 '+sc+' Puan!');
    }
  });
  pipes=pipes.filter(p=>p.x>-PW-35);
  nearMiss();
  CLOUDS.forEach(c=>{c.x-=c.sp;if(c.x<-135){c.x=W+75;c.y=55+Math.random()*145;}});
}

// ── RENDER
function render(){
  X.clearRect(0,0,W,H);
  dSky();dStars();dMoon();
  CLOUDS.forEach(dCloud);
  pipes.forEach(dPipe);
  dGround();
  // Trail
  bird.trail.forEach(t=>{
    const tg=X.createRadialGradient(t.x,t.y,0,t.x,t.y,16);tg.addColorStop(0,`rgba(255,220,60,${t.a*.52})`);tg.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=tg;X.beginPath();X.arc(t.x,t.y,16,0,Math.PI*2);X.fill();
  });
  dBird(X,bird.x,bird.y,bird.vy);
  dParts();
}

// ── PREVIEW CANVAS
const bpc=document.getElementById('bp'),bpx=bpc.getContext('2d');
function renderPreview(){
  bpx.clearRect(0,0,160,120);bpx.save();bpx.translate(72,60);bpx.scale(1.5,1.5);
  const t=Date.now();bird.wp=Math.sin(t*.004)*.65;bird.tp=t*.002;bird.rf=0;
  dBird(bpx,0,0,-6);bpx.restore();
  requestAnimationFrame(renderPreview);
}

// ── IDLE LOOP
function idleLoop(){bird.y=H/2+Math.sin(Date.now()*.0018)*24;bird.vy=Math.sin(Date.now()*.0018)*2;render();aid=requestAnimationFrame(idleLoop);}

// ── INPUT
function flap(){
  if(gst==='idle'){cancelAnimationFrame(aid);startGame();return;}
  if(gst==='playing'){bird.vy=bird.fp;bird.rf=1;burst(bird.x-22,bird.y+7,'#ffe566',6);}
}

document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();flap();}});
document.getElementById('wrap').addEventListener('click',flap);
document.getElementById('wrap').addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});

document.getElementById('rb').addEventListener('click',e=>{
  e.stopPropagation();cancelAnimationFrame(aid);
  document.getElementById('gs').classList.add('hidden');
  gst='idle';sc=0;fr=0;pipes=[];parts=[];rb();
  document.getElementById('ss').classList.remove('hidden');
  document.getElementById('score').style.display='none';
  idleLoop();
});

// ── START
function startGame(){
  gst='playing';sc=0;fr=0;pipes=[];parts=[];rb();
  document.getElementById('ss').classList.add('hidden');
  document.getElementById('gs').classList.add('hidden');
  document.getElementById('score').style.display='block';
  document.getElementById('score').textContent='0';
  function loop(){update();render();aid=requestAnimationFrame(loop);}
  loop();
}

rb();
renderPreview();
idleLoop();
</script>
</body>
